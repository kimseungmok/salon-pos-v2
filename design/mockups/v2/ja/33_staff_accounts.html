<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>33 · アカウント・権限管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',sans-serif;background:#0F1D5C;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.ipad{width:1024px;height:768px;background:#F0F2F7;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.55);position:relative;}

.zone-a{height:44px;flex-shrink:0;background:#fff;border-bottom:.5px solid #E5E5E0;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:10;}
.za-menu{font-size:18px;color:#1E3A8A;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1;user-select:none;}
.za-logo{font-size:13px;color:#1E3A8A;font-weight:700;letter-spacing:.08em;}
.za-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.za-sep{width:.5px;height:14px;background:#D0D0CC;}
.za-avatar{width:24px;height:24px;border-radius:50%;background:#8E44AD;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.za-name{font-size:12px;color:#333;font-weight:500;}
.za-branch{font-size:11px;color:#888;}
.za-time{font-size:11px;color:#555;font-weight:500;}
.za-lock{font-size:13px;color:#bbb;cursor:pointer;}

.sb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.38);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.sb-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:absolute;left:0;top:0;bottom:0;width:224px;background:#1E3A8A;z-index:201;transform:translateX(-100%);transition:transform .22s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:20px 16px 14px;border-bottom:.5px solid rgba(255,255,255,.1);}
.sb-logo{font-size:14px;color:#fff;font-weight:700;letter-spacing:.06em;}
.sb-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .12s;}
.sb-item:hover{background:rgba(255,255,255,.07);}
.sb-item.active{background:rgba(255,255,255,.13);}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-label{font-size:13px;color:rgba(255,255,255,.65);}
.sb-item.active .sb-label{color:#fff;font-weight:600;}
.sb-foot{padding:12px 16px;border-top:.5px solid rgba(255,255,255,.1);}
.sb-ver{font-size:10px;color:rgba(255,255,255,.2);}

.zone-b{height:46px;flex-shrink:0;background:#fff;border-bottom:.5px solid #E5E5E0;display:flex;align-items:center;padding:0 14px;gap:8px;}
.zb-title{font-size:14px;font-weight:700;color:#1A1A1A;}
.zb-tabs{display:flex;background:#F0F2F7;border-radius:9px;padding:3px;gap:2px;margin-left:14px;}
.zb-tab{padding:6px 12px;font-size:12px;font-weight:600;color:#999;cursor:pointer;border-radius:7px;background:transparent;border:none;font-family:inherit;white-space:nowrap;}
.zb-tab.active{background:#fff;color:#C0392B;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.zb-spacer{flex:1;}
.zb-add-btn{display:flex;align-items:center;gap:4px;padding:7px 13px;border-radius:9px;background:#C0392B;color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 2px 8px rgba(192,57,43,.3);}
.zb-add-btn:hover{background:#A93226;}

.content{flex:1;overflow-y:auto;padding:16px 18px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:#D0D0CC;}

/* アカウント一覧テーブル */
.acc-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:.5px solid #E5E5E0;}
.acc-table th{font-size:10px;color:#aaa;text-align:left;padding:10px 12px;border-bottom:.5px solid #EBEBE7;font-weight:700;background:#FAFAF8;text-transform:uppercase;letter-spacing:.05em;}
.acc-table td{padding:9px 12px;font-size:12.5px;border-bottom:.5px solid #F4F4F0;vertical-align:middle;}
.acc-table tr:last-child td{border-bottom:none;}
.acc-name-cell{display:flex;align-items:center;gap:8px;}
.acc-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.acc-id{font-family:monospace;color:#666;}
.acc-pin{font-family:monospace;letter-spacing:1px;color:#999;}
.acc-pin-btn{font-size:9px;color:#2E86C1;cursor:pointer;margin-left:6px;}
.acc-role-select{padding:5px 8px;border-radius:6px;border:.5px solid #D0D0CC;font-size:11px;font-family:inherit;background:#fff;}
.acc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;}
.acc-status.active{background:#EAFAF1;color:#117A65;}
.acc-status.disabled{background:#F4F4F0;color:#aaa;}
.acc-action-btn{font-size:11px;color:#C0392B;cursor:pointer;background:none;border:none;font-family:inherit;padding:3px 6px;}

/* 権限マトリクス (編集可能) */
.perm-section{margin-top:18px;background:#fff;border-radius:12px;border:.5px solid #E5E5E0;padding:16px;}
.perm-section-title{font-size:12px;font-weight:700;color:#333;margin-bottom:4px;}
.perm-section-sub{font-size:11px;color:#999;margin-bottom:12px;}
.perm-matrix{width:100%;border-collapse:collapse;}
.perm-matrix th{font-size:11px;color:#666;font-weight:700;padding:8px;text-align:center;border-bottom:1px solid #EBEBE7;}
.perm-matrix th:first-child{text-align:left;}
.perm-matrix td{padding:9px 8px;text-align:center;border-bottom:.5px solid #F4F4F0;}
.perm-matrix td:first-child{text-align:left;font-size:12px;color:#333;font-weight:600;}
.perm-toggle{width:34px;height:20px;border-radius:10px;background:#E0E0DC;position:relative;cursor:pointer;display:inline-block;transition:.2s;}
.perm-toggle.on{background:#117A65;}
.perm-toggle.locked{background:#C0392B;cursor:not-allowed;opacity:.6;}
.perm-toggle-knob{position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.perm-toggle.on .perm-toggle-knob{left:16px;}
.perm-hint{font-size:10px;color:#bbb;margin-top:10px;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A1A;color:#fff;font-size:12px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="ipad">
  <div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">✂ salon pos</div>
      <div class="sb-sub">Hair Salon Yuki · 全店舗管理</div>
    </div>
    <div class="sb-nav">
      <div class="sb-item" onclick="closeSb()"><div class="sb-dot" style="background:#3B5BDB"></div><span class="sb-label">会計 · POS</span></div>
      <div class="sb-item" onclick="closeSb()"><div class="sb-dot" style="background:#8E44AD"></div><span class="sb-label">予約カレンダー</span></div>
      <div class="sb-item" onclick="closeSb()"><div class="sb-dot" style="background:#10B981"></div><span class="sb-label">顧客管理</span></div>
      <div class="sb-item" onclick="closeSb()"><div class="sb-dot" style="background:#C0392B"></div><span class="sb-label">スタッフ</span></div>
      <div class="sb-item active" onclick="closeSb()"><div class="sb-dot" style="background:#1A5276"></div><span class="sb-label">システム設定</span></div>
    </div>
    <div class="sb-foot"><div class="sb-ver">v2.0.0</div></div>
  </div>

  <div class="zone-a">
    <span class="za-menu" onclick="openSb()">☰</span>
    <span class="za-logo">✂ salon pos</span>
    <div class="za-right">
      <div class="za-avatar" style="background:#C0392B;">管</div>
      <span class="za-name">Admin</span>
      <span class="za-branch">全店舗</span>
      <div class="za-sep"></div>
      <span class="za-time" id="tbTime">06.21 日　23:30</span>
      <span class="za-lock">🔒</span>
    </div>
  </div>

  <div class="zone-b">
    <span class="zb-title">アカウント・権限管理</span>
    <div class="zb-tabs">
      <div class="zb-tab active">アカウント一覧</div>
    </div>
    <div class="zb-spacer"></div>
    <button class="zb-add-btn" onclick="toast('新規アカウント発行フォーム（モック）')">＋アカウント発行</button>
  </div>

  <div class="content">
    <table class="acc-table">
      <tr><th>スタッフ</th><th>ログインID</th><th>PIN</th><th>所属店舗</th><th>権限レベル</th><th>状態</th><th></th></tr>
      <tbody id="accRows"></tbody>
    </table>

    <div class="perm-section">
      <div class="perm-section-title">権限マトリクス（直接編集可能）</div>
      <div class="perm-section-sub">役割ごとに機能の ON/OFF を切り替えます。オーナー列は変更不可（常に全権限）。</div>
      <table class="perm-matrix">
        <tr><th>機能</th><th>オーナー</th><th>店長</th><th>主任</th><th>スタッフ</th></tr>
        <tbody id="permRows"></tbody>
      </table>
      <div class="perm-hint">※ この設定はアカウント一覧の「権限レベル」列と連動します。実装時はサーバー保存が必要。</div>
    </div>
  </div>
</div>

<script>
const ROLE_LABEL={owner:'オーナー',manager:'店長',senior:'主任',staff:'スタッフ'};
const ROLE_COLOR={owner:'#C0392B',manager:'#8E44AD',senior:'#2E86C1',staff:'#117A65'};

let ACCOUNTS=[
  {id:1, name:'Admin', initial:'管', loginId:'admin',   pin:'9999', branch:'全店舗', role:'owner',   active:true},
  {id:2, name:'Yuki',  initial:'由', loginId:'yuki01',  pin:'1234', branch:'渋谷店', role:'manager', active:true},
  {id:3, name:'Mika',  initial:'美', loginId:'mika01',  pin:'2345', branch:'渋谷店', role:'senior',  active:true},
  {id:4, name:'Kenji', initial:'健', loginId:'kenji01', pin:'3456', branch:'渋谷店', role:'staff',   active:true},
  {id:5, name:'Rio',   initial:'里', loginId:'rio01',   pin:'4567', branch:'池袋店', role:'staff',   active:true},
  {id:6, name:'Hana',  initial:'花', loginId:'hana01',  pin:'5678', branch:'渋谷店', role:'senior',  active:false},
];

let PERMS=[
  {label:'開店・閉店処理',          owner:1, manager:1, senior:0, staff:0},
  {label:'スタッフ・権限管理',       owner:1, manager:1, senior:0, staff:0},
  {label:'売上レポート（全体）',     owner:1, manager:1, senior:0, staff:0},
  {label:'返金・取消承認',          owner:1, manager:1, senior:1, staff:0},
  {label:'POS・予約操作',          owner:1, manager:1, senior:1, staff:1},
  {label:'顧客管理（VIP/ブラック）', owner:1, manager:1, senior:1, staff:0},
];

function renderAccounts(){
  document.getElementById('accRows').innerHTML = ACCOUNTS.map((a,i)=>{
    const roleOptions=Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${r===a.role?'selected':''}>${ROLE_LABEL[r]}</option>`).join('');
    return `<tr>
      <td><div class="acc-name-cell"><div class="acc-avatar" style="background:${ROLE_COLOR[a.role]}">${a.initial}</div>${a.name}</div></td>
      <td class="acc-id">${a.loginId}</td>
      <td><span class="acc-pin" id="pin-${i}">••••</span><span class="acc-pin-btn" onclick="revealPin(${i})">表示</span></td>
      <td>${a.branch}</td>
      <td><select class="acc-role-select" onchange="changeRole(${i}, this.value)">${roleOptions}</select></td>
      <td><span class="acc-status ${a.active?'active':'disabled'}">${a.active?'有効':'無効'}</span></td>
      <td><button class="acc-action-btn" onclick="toggleActive(${i})">${a.active?'無効化':'有効化'}</button></td>
    </tr>`;
  }).join('');
}
function revealPin(i){
  document.getElementById('pin-'+i).textContent=ACCOUNTS[i].pin;
  setTimeout(()=>{ const el=document.getElementById('pin-'+i); if(el) el.textContent='••••'; },3000);
}
function changeRole(i, role){
  ACCOUNTS[i].role=role;
  toast(`${ACCOUNTS[i].name} の権限レベルを ${ROLE_LABEL[role]} に変更しました`);
  renderAccounts();
}
function toggleActive(i){
  ACCOUNTS[i].active=!ACCOUNTS[i].active;
  toast(`${ACCOUNTS[i].name} を${ACCOUNTS[i].active?'有効化':'無効化'}しました`);
  renderAccounts();
}

function renderPerms(){
  const roles=['owner','manager','senior','staff'];
  document.getElementById('permRows').innerHTML = PERMS.map((p,ri)=>`
    <tr><td>${p.label}</td>${roles.map(r=>{
      const isOwner=r==='owner';
      const on=p[r]===1;
      return `<td><div class="perm-toggle ${on?'on':''} ${isOwner?'locked':''}" onclick="${isOwner?'':`togglePerm(${ri},'${r}')`}"><div class="perm-toggle-knob"></div></div></td>`;
    }).join('')}</tr>`).join('');
}
function togglePerm(ri, role){
  PERMS[ri][role] = PERMS[ri][role]?0:1;
  toast(`「${PERMS[ri].label}」の${ROLE_LABEL[role]}権限を${PERMS[ri][role]?'許可':'禁止'}にしました`);
  renderPerms();
}

function openSb(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sbOverlay').classList.add('open'); }
function closeSb(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('open'); }

let _tt;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400); }

const DOW=['日','月','火','水','木','金','土'];
function tick(){
  const d=new Date();
  const el=document.getElementById('tbTime');
  if(el) el.textContent=`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${DOW[d.getDay()]}　${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

renderAccounts();
renderPerms();
tick();
setInterval(tick,30000);
</script>
</body>
</html>
