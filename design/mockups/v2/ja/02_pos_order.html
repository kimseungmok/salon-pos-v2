<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>02 · POS 注文 — salon-pos-v2 v2 JA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',sans-serif;background:#E8E8E4;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

.ipad{width:1024px;height:768px;background:#F4F4F0;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.35);position:relative;}

/* ── Topbar ── */
.topbar{height:44px;background:white;border-bottom:.5px solid #E0E0DC;display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0;position:relative;z-index:10;}
.tb-hamburger{width:32px;height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border-radius:8px;flex-shrink:0;}
.tb-hamburger:hover{background:#F4F4F0;}
.tb-hamburger span{display:block;width:18px;height:1.5px;background:#1E3A8A;border-radius:2px;}
.tb-logo{font-size:13px;color:#1E3A8A;font-weight:600;letter-spacing:.06em;}
.tb-logo em{font-style:normal;color:#3B5BDB;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tb-sep{width:.5px;height:16px;background:#E0E0DC;}
.tb-avatar{width:26px;height:26px;border-radius:50%;background:#8E44AD;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:white;flex-shrink:0;}
.tb-staff{font-size:12px;color:#333;font-weight:500;}
.tb-branch{font-size:11px;color:#555;margin-left:2px;font-weight:500;}
.tb-time{font-size:11px;color:#555;font-weight:500;}
.tb-lock{font-size:14px;color:#C0C0BC;cursor:pointer;}

/* ── Sidebar ── */
.sidebar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:20;opacity:0;pointer-events:none;transition:opacity .2s;}
.sidebar-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:absolute;left:0;top:0;bottom:0;width:560px;background:#1E3A8A;z-index:21;transform:translateX(-100%);transition:transform .22s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;box-shadow:6px 0 32px rgba(0,0,0,.4);}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:18px 16px 14px;border-bottom:.5px solid rgba(255,255,255,.1);}
.sb-logo{font-size:14px;color:white;font-weight:600;letter-spacing:.06em;}
.sb-salon{font-size:10px;color:rgba(255,255,255,.32);margin-top:5px;}
.sb-menu{flex:1;overflow-y:auto;padding:6px 0;}
.sb-item{display:flex;align-items:center;gap:11px;padding:12px 16px;cursor:pointer;transition:background .12s;user-select:none;}
.sb-item:hover{background:rgba(255,255,255,.07);}
.sb-item.on{background:rgba(255,255,255,.11);}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-label{font-size:13px;color:rgba(255,255,255,.65);}
.sb-item.on .sb-label{color:white;font-weight:500;}
.sb-foot{padding:12px 16px;border-top:.5px solid rgba(255,255,255,.08);}
.sb-ver{font-size:10px;color:rgba(255,255,255,.2);}

/* ── Main ── */
.main{display:flex;flex:1;overflow:hidden;}
.product-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:.5px solid #E0E0DC;position:relative;}

/* ── Category bar (parent) ── */
.cat-bar{
  height:40px;background:white;border-bottom:.5px solid #E0E0DC;
  display:flex;align-items:stretch;flex-shrink:0;position:relative;z-index:12;
}
.cat-scroll{
  flex:1;display:flex;align-items:stretch;
  overflow-x:auto;overflow-y:hidden;
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;min-width:0;
}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-tab{
  font-size:12px;color:#444;
  padding:0 15px;cursor:pointer;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:4px;
  border-right:.5px solid #EBEBEA;user-select:none;transition:background .1s,color .1s;
}
.cat-tab:first-child{border-left:.5px solid #EBEBEA;}
.cat-tab:hover{color:#111;background:#F6F6F4;}
.cat-tab.on{background:#1E3A8A;color:white;font-weight:500;border-right-color:#1E3A8A;border-left-color:#1E3A8A;}
.cat-tab .hc{font-size:8px;opacity:.55;}
.cat-add{font-size:15px;color:#AAA;padding:0 13px;display:flex;align-items:center;cursor:pointer;flex-shrink:0;border-right:.5px solid #EBEBEA;}
.cat-add:hover{color:#444;background:#F4F4F0;}
.cat-expand-area{display:none;align-items:center;padding:0 8px;border-left:.5px solid #EBEBEA;background:white;flex-shrink:0;}
.cat-expand-btn{width:28px;height:28px;border-radius:6px;border:.5px solid #E0E0DC;background:white;font-size:11px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cat-expand-btn:hover{background:#F4F4F0;}
.cat-expand-btn.open{background:#1E3A8A;color:white;border-color:#1E3A8A;}
.cat-dropdown{position:absolute;top:40px;left:0;right:0;background:white;border-bottom:.5px solid #D8D8D4;padding:10px 14px;z-index:15;display:none;flex-wrap:wrap;gap:6px;align-items:center;box-shadow:0 8px 24px rgba(0,0,0,.12);}
.cat-dropdown.open{display:flex;}
.cat-dd-item{font-size:12px;color:#444;padding:6px 14px;border:.5px solid #E0E0DC;cursor:pointer;white-space:nowrap;transition:all .1s;display:flex;align-items:center;gap:4px;}
.cat-dd-item:hover{border-color:#888;color:#111;}
.cat-dd-item.on{background:#1E3A8A;color:white;border-color:#1E3A8A;font-weight:500;}
.cat-dd-add{font-size:12px;color:#3B5BDB;padding:6px 14px;border:.5px dashed #C5D0FC;cursor:pointer;white-space:nowrap;}
.cat-dd-add:hover{background:#EEF2FF;}

/* ── Sub-category bar ── */
.subcat-bar{height:0;overflow:hidden;background:#F4F4F2;border-bottom:.5px solid transparent;display:flex;align-items:stretch;flex-shrink:0;position:relative;transition:height .18s,border-color .18s;}
.subcat-bar.open{height:36px;border-bottom-color:#E0E0DC;}
.subcat-scroll{flex:1;display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-width:0;}
.subcat-scroll::-webkit-scrollbar{display:none;}
.subcat-tab{font-size:11px;color:#444;padding:0 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;border-right:.5px solid #E8E8E4;user-select:none;transition:background .1s,color .1s;}
.subcat-tab:first-child{border-left:.5px solid #E8E8E4;}
.subcat-tab:hover{color:#111;background:#EEEEEA;}
.subcat-tab.on{background:#444;color:white;font-weight:500;border-right-color:#444;border-left-color:#444;}
.subcat-add{font-size:14px;color:#AAA;padding:0 10px;display:flex;align-items:center;cursor:pointer;flex-shrink:0;border-right:.5px solid #E8E8E4;}
.subcat-add:hover{color:#444;background:#EAEAE6;}
.subcat-expand-area{display:none;align-items:center;padding:0 6px;background:#F4F4F2;flex-shrink:0;}
.subcat-expand-btn{width:24px;height:24px;border-radius:5px;border:.5px solid #DDDDD8;background:#EAEAE6;font-size:10px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.subcat-expand-btn.open{background:#444;color:white;border-color:#444;}
.subcat-dropdown{position:absolute;top:36px;left:0;right:0;background:white;border-bottom:.5px solid #D8D8D4;padding:8px 12px;z-index:11;display:none;flex-wrap:wrap;gap:5px;box-shadow:0 6px 18px rgba(0,0,0,.1);}
.subcat-dropdown.open{display:flex;}
.subcat-dd-item{font-size:11px;color:#444;padding:5px 12px;border:.5px solid #E0E0DC;cursor:pointer;white-space:nowrap;transition:all .1s;}
.subcat-dd-item:hover{border-color:#888;color:#111;}
.subcat-dd-item.on{background:#444;color:white;border-color:#444;font-weight:500;}
.subcat-dd-add{font-size:11px;color:#3B5BDB;padding:5px 12px;border:.5px dashed #C5D0FC;cursor:pointer;}
.subcat-dd-add:hover{background:#EEF2FF;}

/* ── Product grid (4×5, no scroll) ── */
.product-grid{flex:1;padding:9px 12px;overflow:hidden;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(5,1fr);gap:8px;}
/* 2026-06-23 토스플레이스 실제 스크린샷 기준 보정: 상품 카드는 화이트+컬러스트립이 아니라
   카테고리 등록 시 고른 색상 스와치를 카드 전체 배경으로 채우는 방식(흰색 텍스트). */
.prod-card{border:none;border-radius:10px;padding:10px 10px 8px;cursor:pointer;transition:all .12s;user-select:none;display:flex;flex-direction:column;gap:3px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.prod-card:hover{filter:brightness(1.06);box-shadow:0 3px 10px rgba(0,0,0,.18);}
.prod-card:active{transform:scale(.97);}
.prod-card.in-cart{outline:3px solid #1B64DA;outline-offset:-3px;}
.prod-badge{font-size:9px;font-weight:700;color:white;background:rgba(0,0,0,.45);border-radius:3px;padding:1px 5px;align-self:flex-end;flex-shrink:0;}
.prod-name{font-size:12px;font-weight:700;color:#fff;line-height:1.35;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;text-shadow:0 1px 2px rgba(0,0,0,.12);}
.prod-price{font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.prod-time{font-size:10px;color:rgba(255,255,255,.75);flex-shrink:0;}
.prod-empty{background:#F9F9F7;border:1px dashed #DDDDD8;border-radius:10px;display:flex;align-items:center;justify-content:center;}

/* ── Edit mode grid ── */
.product-grid.edit-mode{background:#F0EEE8;padding:8px;gap:6px;}

/* edit card redesign — bigger, clearer */
.edit-card{
  background:white;border:1.5px solid #D0D0CC;border-radius:10px;
  padding:7px 7px 6px;display:flex;flex-direction:column;gap:3px;
  cursor:grab;user-select:none;overflow:hidden;
}
.edit-card.hidden-item{background:#F6F6F4;border-style:dashed;opacity:.5;}
.edit-drag{font-size:9px;color:#D0D0CC;text-align:center;letter-spacing:4px;flex-shrink:0;}
.edit-name{font-size:11px;font-weight:500;color:#333;line-height:1.3;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.edit-price{font-size:11px;color:#3B5BDB;font-weight:600;flex-shrink:0;}

/* two big buttons at bottom of edit card */
.edit-btns{display:flex;gap:4px;flex-shrink:0;margin-top:3px;}
.edit-btn{
  flex:1;padding:5px 3px;border-radius:6px;font-size:10px;font-weight:600;
  text-align:center;cursor:pointer;border:1.5px solid;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.edit-btn-vis{background:#EEF2FF;color:#3B5BDB;border-color:#C5D0FC;}
.edit-btn-vis:hover{background:#D6EAF8;}
.edit-btn-vis.is-hidden{background:#F4F4F0;color:#AAA;border-color:#D8D8D4;}
.edit-btn-vis.is-hidden:hover{background:#EAEAE6;}
.edit-btn-del{background:#FEF0F0;color:#C0392B;border-color:#F5B7B1;}
.edit-btn-del:hover{background:#FDEDEC;}

.edit-empty{background:#F9F9F7;border:1.5px dashed #D8D8D4;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .12s;}
.edit-empty:hover{border-color:#888;background:#F2F2EE;}
.edit-empty-plus{font-size:20px;color:#CCC;}
.edit-empty-lbl{font-size:9px;color:#CCC;font-weight:500;}
.edit-empty:hover .edit-empty-plus,.edit-empty:hover .edit-empty-lbl{color:#888;}

/* ── Grid bar ── */
.grid-bar{height:38px;background:white;border-top:.5px solid #E0E0DC;display:flex;align-items:center;padding:0 10px;gap:7px;flex-shrink:0;}
.grid-bar-btn{font-size:11px;color:#555;padding:5px 11px;border-radius:7px;border:.5px solid #D8D8D4;background:#F4F4F0;cursor:pointer;white-space:nowrap;transition:all .12s;}
.grid-bar-btn:hover{background:#EAEAE6;}
.grid-bar-btn.active{background:#1E3A8A;color:white;border-color:#1E3A8A;}
.grid-bar-btn.danger{color:#C0392B;border-color:#F5B7B1;background:#FEF0F0;}
.grid-bar-btn.danger:hover{background:#FDEDEC;}
.grid-bar-sep{flex:1;}
.grid-page{display:flex;align-items:center;gap:6px;}
.grid-page-btn{width:26px;height:26px;border-radius:6px;border:.5px solid #D8D8D4;background:#F4F4F0;font-size:12px;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.grid-page-btn:hover{background:#EAEAE6;}
.grid-page-btn:disabled{color:#CCC;cursor:default;background:#F4F4F0;}
.grid-page-num{font-size:11px;color:#888;min-width:36px;text-align:center;}

/* ── Cart panel ── */
.cart-panel{width:318px;background:white;display:flex;flex-direction:column;flex-shrink:0;}
.cart-items{flex:1;overflow-y:auto;}
.cart-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#CCC;}
.cart-empty-icon{font-size:32px;}
.cart-empty-text{font-size:12px;}
.ci{padding:9px 13px;border-bottom:.5px solid #F0F0EC;}
.ci:last-child{border-bottom:none;}
.ci-top{display:flex;align-items:flex-start;gap:7px;}
.ci-name{flex:1;font-size:12px;font-weight:500;color:#1A1A1A;line-height:1.35;}
.ci-price-wrap{text-align:right;flex-shrink:0;}
.ci-price{font-size:13px;font-weight:600;color:#1A1A1A;white-space:nowrap;display:block;}
.ci-price-orig{font-size:10px;color:#CCC;text-decoration:line-through;display:none;}
.ci-price.discounted{color:#E74C3C;}
.ci-del{width:28px;height:28px;border-radius:6px;border:.5px solid #E8E8E4;background:#F9F9F7;font-size:12px;color:#CCC;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ci-del:hover{background:#FDEDEC;border-color:#FACACA;color:#E74C3C;}
.ci-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.ci-qty-group{display:flex;align-items:center;gap:5px;}
.qty-btn{width:28px;height:28px;border-radius:6px;border:.5px solid #D8D8D4;background:#F4F4F0;font-size:15px;color:#444;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.qty-btn:hover{background:#E4E4E0;}
.qty-val{font-size:13px;font-weight:500;width:26px;text-align:center;color:#1A1A1A;}

/* per-item discount button — same height as qty buttons */
.ci-disc-btn{
  height:28px;min-width:28px;padding:0 7px;
  border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;
  border:.5px solid #D8D8D4;background:#F4F4F0;color:#555;
  white-space:nowrap;transition:all .12s;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.ci-disc-btn:hover{background:#EEE8F8;border-color:#8E44AD;color:#8E44AD;}
.ci-disc-btn.on{background:#F5EEF8;border-color:#8E44AD;color:#8E44AD;}

/* ── Confirm modal (unsaved edit) ── */
.confirm-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.45);
  z-index:60;display:none;align-items:center;justify-content:center;
}
.confirm-overlay.open{display:flex;}
.confirm-modal{
  background:white;border-radius:14px;width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);padding:24px 22px 18px;
  display:flex;flex-direction:column;gap:10px;
}
.confirm-icon{font-size:28px;text-align:center;}
.confirm-title{font-size:15px;font-weight:700;color:#1A1A1A;text-align:center;}
.confirm-msg{font-size:12px;color:#888;text-align:center;line-height:1.6;}
.confirm-btns{display:flex;gap:8px;margin-top:6px;}
.confirm-btn{flex:1;padding:11px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .12s;}
.confirm-btn-discard{background:#FEF0F0;color:#C0392B;}
.confirm-btn-discard:hover{background:#FDEDEC;}
.confirm-btn-keep{background:#1E3A8A;color:white;}
.confirm-btn-keep:hover{background:#2C3E50;}

.cart-summary{padding:10px 14px;border-top:.5px solid #E0E0DC;flex-shrink:0;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;}
.sum-lbl{color:#999;}
.sum-val{color:#1A1A1A;font-weight:500;}
.sum-disc-val{color:#E74C3C;font-weight:600;}
.sum-divider{height:.5px;background:#E5E5E0;margin:5px 0;}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;}
.sum-total-lbl{font-size:12px;color:#555;font-weight:600;}
.sum-total-val{font-size:22px;font-weight:700;color:#1A1A1A;}
.sum-tax{font-size:10px;color:#BBB;text-align:right;margin-top:1px;}
.pay-btn{margin:8px 12px 12px;padding:14px;border-radius:10px;background:#3B5BDB;color:white;font-size:15px;font-weight:600;text-align:center;cursor:pointer;border:none;font-family:inherit;width:calc(100% - 24px);transition:background .12s;}
.pay-btn:hover{background:#3451C7;}
.pay-btn:active{transform:scale(.98);}
.pay-btn.disabled{background:#D0D0CC;cursor:not-allowed;}
.pay-btn.disabled:hover{background:#D0D0CC;}

/* ── Discount modal ── */
.disc-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.45);
  z-index:50;display:none;align-items:center;justify-content:center;
}
.disc-overlay.open{display:flex;}
.disc-modal{
  background:white;border-radius:14px;width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;
}
.disc-head{padding:16px 18px 12px;border-bottom:.5px solid #F0F0EC;}
.disc-head-label{font-size:10px;color:#AAA;font-weight:500;letter-spacing:.06em;margin-bottom:4px;}
.disc-head-name{font-size:15px;font-weight:600;color:#1A1A1A;}
.disc-head-price{font-size:13px;color:#888;margin-top:2px;}

/* type tabs */
.disc-type-tabs{display:flex;border-bottom:.5px solid #F0F0EC;}
.disc-type-tab{flex:1;padding:10px;font-size:12px;font-weight:500;color:#888;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;}
.disc-type-tab.on{color:#8E44AD;border-bottom-color:#8E44AD;}

/* presets */
.disc-presets{padding:14px 18px 8px;display:flex;gap:7px;flex-wrap:wrap;}
.disc-preset{
  padding:7px 13px;border-radius:8px;border:1.5px solid #E0E0DC;
  font-size:12px;font-weight:600;color:#555;cursor:pointer;transition:all .12s;
}
.disc-preset:hover{border-color:#8E44AD;color:#8E44AD;background:#F9F5FC;}
.disc-preset.on{background:#8E44AD;color:white;border-color:#8E44AD;}

/* custom input */
.disc-custom{padding:4px 18px 14px;display:flex;align-items:center;gap:8px;}
.disc-custom-label{font-size:11px;color:#AAA;white-space:nowrap;}
.disc-custom-inp{
  flex:1;padding:7px 10px;border:.5px solid #D8D8D4;border-radius:8px;
  font-size:13px;font-weight:600;color:#1A1A1A;
  outline:none;font-family:inherit;text-align:right;
}
.disc-custom-inp:focus{border-color:#8E44AD;}
.disc-custom-unit{font-size:13px;font-weight:600;color:#555;width:22px;}

/* preview */
.disc-preview{
  margin:0 18px 14px;padding:10px 14px;
  background:#F9F5FC;border-radius:8px;
  border:.5px solid #E8D5F5;
}
.disc-preview-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;}
.disc-preview-lbl{color:#AAA;}
.disc-preview-val{font-weight:500;color:#1A1A1A;}
.disc-preview-val.red{color:#E74C3C;font-weight:700;}
.disc-preview-val.purple{color:#8E44AD;font-size:13px;font-weight:700;}

/* actions */
.disc-actions{display:flex;gap:8px;padding:0 18px 16px;}
.disc-act{flex:1;padding:10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .12s;}
.disc-act-clear{background:#FEF0F0;color:#C0392B;}
.disc-act-clear:hover{background:#FDEDEC;}
.disc-act-cancel{background:#F4F4F0;color:#666;}
.disc-act-cancel:hover{background:#EAEAE6;}
.disc-act-apply{background:#8E44AD;color:white;}
.disc-act-apply:hover{background:#7D3C98;}

/* ── Toast (fixed above iPad) ── */
.toast{
  position:fixed;top:18px;left:50%;
  transform:translateX(-50%) translateY(-16px);
  background:white;color:#1A1A1A;
  font-size:12px;font-weight:500;
  padding:10px 20px 10px 16px;border-radius:12px;

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type='blue', duration=2400) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type+' show';
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),duration);
}

// ── Scroll fade ───────────────────────────────────────────────────────────────
const FADE = 55;
function updateMask(el) {
  if(!el)return;
  const atStart=el.scrollLeft<=1;
  const atEnd=el.scrollLeft+el.clientWidth>=el.scrollWidth-1;
  let mask='';
  if(!atStart&&!atEnd) mask=`linear-gradient(to right,transparent 0px,black ${FADE}px,black calc(100% - ${FADE}px),transparent 100%)`;
  else if(!atStart)    mask=`linear-gradient(to right,transparent 0px,black ${FADE}px)`;
  else if(!atEnd)      mask=`linear-gradient(to right,black calc(100% - ${FADE}px),transparent 100%)`;
  el.style.webkitMaskImage=mask;
  el.style.maskImage=mask;
}
function initScrollFade(el){
  if(!el)return;
  el.addEventListener('scroll',()=>updateMask(el));
  requestAnimationFrame(()=>updateMask(el));
}
function checkOverflow(scrollEl,expandAreaEl){
  requestAnimationFrame(()=>{
    const overflow=scrollEl.scrollWidth>scrollEl.clientWidth+1;
    expandAreaEl.style.display=overflow?'flex':'none';
    updateMask(scrollEl);
  });
}

// ── Parent category bar ───────────────────────────────────────────────────────
function renderCatBar() {
  const scroll=document.getElementById('catScroll');
  scroll.innerHTML=CATS.map(c=>{
    const on=c.id===currentParentId?' on':'';
    const arrow=c.children.length>1?'<span class="hc">▾</span>':'';
    return `<span class="cat-tab${on}" onclick="selectParent('${c.id}')">${c.name}${arrow}</span>`;
  }).join('')+`<span class="cat-add" onclick="addCategory()">＋</span>`;
  checkOverflow(scroll,document.getElementById('catExpandArea'));
}
function selectParent(id) {
  currentParentId=id; currentChildId=id+'_all'; currentPage=0;
  if(catDropdownOpen)closeCatDropdown();
  requestAnimationFrame(()=>scrollToActive(document.getElementById('catScroll'),'.cat-tab.on'));
  renderCatBar();renderSubcatBar();renderProducts();
}
function scrollToActive(el,sel){
  const tab=el.querySelector(sel);if(!tab)return;
  el.scrollTo({left:Math.max(0,tab.offsetLeft-(el.clientWidth-tab.offsetWidth)/2),behavior:'smooth'});
}
function toggleCatDropdown(){
  catDropdownOpen=!catDropdownOpen;
  document.getElementById('catExpandBtn').classList.toggle('open',catDropdownOpen);
  const dd=document.getElementById('catDropdown');
  if(catDropdownOpen){
    dd.innerHTML=CATS.map(c=>{
      const on=c.id===currentParentId?' on':'';
      const arrow=c.children.length>1?'<span class="hc">▾</span>':'';
      return `<div class="cat-dd-item${on}" onclick="selectParent('${c.id}')">${c.name}${arrow}</div>`;
    }).join('')+`<div class="cat-dd-add" onclick="addCategory()">＋ カテゴリを追加</div>`;
    dd.classList.add('open');
  }else dd.classList.remove('open');
}
function closeCatDropdown(){

}

  scroll.innerHTML=parent.children.map(ch=>{
    const on=ch.id===currentChildId?' on':'';
    return `<span class="subcat-tab${on}" onclick="selectChild('${ch.id}')">${ch.name}</span>`;
  }).join('')+`<span class="subcat-add" onclick="addSubcat('${parent.id}')">＋</span>`;
  checkOverflow(scroll,expArea);
  requestAnimationFrame(()=>scrollToActive(scroll,'.subcat-tab.on'));
}
function selectChild(childId){
  currentChildId=childId;currentPage=0;
  if(subcatDropdownOpen)closeSubcatDropdown();
  renderSubcatBar();renderProducts();
}
function toggleSubcatDropdown(){
  const parent=CATS.find(c=>c.id===currentParentId);if(!parent)return;
  subcatDropdownOpen=!subcatDropdownOpen;
  document.getElementById('subcatExpandBtn').classList.toggle('open',subcatDropdownOpen);
  const dd=document.getElementById('subcatDropdown');
  if(subcatDropdownOpen){
    dd.innerHTML=parent.children.map(ch=>{
      const on=ch.id===currentChildId?' on':'';
      return `<div class="subcat-dd-item${on}" onclick="selectChild('${ch.id}')">${ch.name}</div>`;
    }).join('')+`<div class="subcat-dd-add" onclick="addSubcat('${parent.id}')">＋ サブカテゴリを追加</div>`;
    dd.classList.add('open');
  }else dd.classList.remove('open');
}
function closeSubcatDropdown(){
  subcatDropdownOpen=false;
  document.getElementById('subcatExpandBtn').classList.remove('open');
  document.getElementById('subcatDropdown').classList.remove('open');
}

// ── Product grid ──────────────────────────────────────────────────────────────
function activeKey(){
  if(currentChildId&&currentChildId.endsWith('_all'))return currentParentId;
  return currentChildId||currentParentId;
}
function getSlotArr(){
  const k=activeKey();
  if(!SLOTS[k])SLOTS[k]=Array(PAGE).fill(null);
  return SLOTS[k];
}
function totalPages(){return Math.max(1,Math.ceil(getSlotArr().length/PAGE));}
function currentSlots(){
  const all=getSlotArr();
  while(all.length<PAGE)all.push(null);
  return all.slice(currentPage*PAGE,(currentPage+1)*PAGE);
}

function renderProducts(){
  const grid=document.getElementById('productGrid');
  const slots=currentSlots();
  const tp=totalPages();
  document.getElementById('pageNum').textContent=(currentPage+1)+' / '+tp;
  document.getElementById('pageBack').disabled=currentPage===0;
  document.getElementById('pageNext').disabled=currentPage>=tp-1;

  if(editMode){
    grid.className='product-grid edit-mode';
    grid.innerHTML=slots.map((p,i)=>{
      if(!p) return `<div class="edit-empty" onclick="addProductAtSlot(${i})"><div class="edit-empty-plus">＋</div><div class="edit-empty-lbl">商品を追加</div></div>`;
      const hiddenClass=p.visible?'':'hidden-item';
      const visLabel=p.visible?'👁 表示中':'🚫 非表示';
      const visCls=p.visible?'edit-btn edit-btn-vis':'edit-btn edit-btn-vis is-hidden';
      return `<div class="edit-card ${hiddenClass}" draggable="true">
        <div class="edit-drag">· · ·</div>
        <div class="edit-name">${p.name}</div>
        <div class="edit-price">¥${p.price.toLocaleString()}</div>
        <div class="edit-btns">
          <div class="${visCls}" onclick="toggleVisible(${i})">${visLabel}</div>
          <div class="edit-btn edit-btn-del" onclick="deleteSlot(${i})">✕ 取り外す</div>
        </div>
      </div>`;
    }).join('');
  }else{
    grid.className='product-grid';
    grid.innerHTML=slots.map((p,i)=>{
      if(!p||!p.visible)return`<div class="prod-empty"></div>`;
      const ic=cart.some(c=>c.name===p.name);
      return`<div class="prod-card${ic?' in-cart':''}" style="background:${tileColor(i)};" onclick='addToCart(${JSON.stringify(p)})'>
        ${p.badge?`<span class="prod-badge">${p.badge}</span>`:''}
        <span class="prod-name">${p.name}</span>
        <span class="prod-price">¥${p.price.toLocaleString()}</span>
        ${p.time?`<span class="prod-time">${p.time}</span>`:''}
      </div>`;
    }).join('');
  }
}

function changePage(d){
  currentPage=Math.max(0,Math.min(totalPages()-1,currentPage+d));
  renderProducts();
}
function addPage(){
  getSlotArr().push(...Array(PAGE).fill(null));
  currentPage=totalPages()-1;
  isDirty=true;
  renderProducts();
  showToast('ページを追加しました','green');
}
function deletePage(){
  const arr=getSlotArr();
  if(totalPages()<=1){showToast('最後のページは削除できません','blue');return;}
  const start=currentPage*PAGE;
  arr.splice(start,PAGE);
  currentPage=Math.min(currentPage,totalPages()-1);
  isDirty=true;
  renderProducts();
  showToast('ページを削除しました','blue');
}
function saveGrid(){
  isDirty=false;
  showToast('✓ グリッドを保存しました','green');
  // ボタンを保存済みスタイルに一瞬変える
  const btn=document.getElementById('btnSave');
  btn.textContent='✓ 保存済み';
  setTimeout(()=>{btn.textContent='💾 保存する';},1800);
}
function toggleEditMode(){
  if(editMode && isDirty){
    // 未保存変更あり → 確認モーダル表示
    openConfirmModal();
    return;
  }
  _exitOrEnterEditMode();
}
function _exitOrEnterEditMode(){
  editMode=!editMode;
  isDirty=false;
  document.getElementById('editModeBtn').classList.toggle('active',editMode);
  document.getElementById('btnSave').style.display=editMode?'':'none';
  document.getElementById('btnAddPage').style.display=editMode?'':'none';
  document.getElementById('btnDelPage').style.display=editMode?'':'none';
  showToast(
    editMode?'✏ グリッド編集モード':'✓ 編集モードを終了しました',
    editMode?'purple':'green'
  );
  renderProducts();
}
function openConfirmModal(){document.getElementById('confirmOverlay').classList.add('open');}
function closeConfirmModal(){document.getElementById('confirmOverlay').classList.remove('open');}
function confirmDiscardEdit(){
  closeConfirmModal();
  isDirty=false;
  _exitOrEnterEditMode(); // editMode は true なので false に切り替わる
}
function toggleVisible(i){
  const arr=getSlotArr();const g=currentPage*PAGE+i;
  if(arr[g]){arr[g].visible=!arr[g].visible;isDirty=true;renderProducts();}
}
function deleteSlot(i){
  getSlotArr()[currentPage*PAGE+i]=null;
  isDirty=true;
  renderProducts();
  showToast('グリッドから取り外しました（商品データは保持されています）','blue',3000);
}
// ── Product Picker Modal ──────────────────────────────────────────────────────
let pickerSlotIdx = null;
let pickerParentId = null;
let pickerChildId  = null;

function openPickerModal(slotIdx) {
  pickerSlotIdx = slotIdx;
  // default to current parent
  pickerParentId = CATS[0].id;
  pickerChildId  = CATS[0].children[0].id;
  document.getElementById('pickerOverlay').classList.add('open');
  renderPickerCats();
  renderPickerSubcats();
  renderPickerGrid();
}
function closePickerModal() {
  document.getElementById('pickerOverlay').classList.remove('open');
  pickerSlotIdx = null;
}
function handlePickerOverlayClick(e) {
  if (e.target === document.getElementById('pickerOverlay')) closePickerModal();
}

function renderPickerCats() {
  document.getElementById('pickerCats').innerHTML = CATS.map(c => {
    const items = (SLOTS[c.id] || []).filter(x => x !== null);
    const on = c.id === pickerParentId ? ' on' : '';
    return `<div class="pcat-item${on}" onclick="pickParent('${c.id}')">
      <span>${c.name}</span>
      <span class="pcat-count">${items.length}</span>
    </div>`;
  }).join('');
}

function renderPickerSubcats() {
  const cat = CATS.find(c => c.id === pickerParentId);
  if (!cat) return;
  document.getElementById('pickerSubcatBar').innerHTML = cat.children.map(ch => {
    const on = ch.id === pickerChildId ? ' on' : '';
    return `<div class="psubcat${on}" onclick="pickChild('${ch.id}')">${ch.name}</div>`;
  }).join('');
}

function renderPickerGrid() {
  // get products for current child (or parent if _all)
  let key = pickerChildId;
  // _all → use parent key
  if (pickerChildId && pickerChildId.endsWith('_all')) key = pickerParentId;
  const items = (SLOTS[key] || []).filter(x => x !== null);

  const grid = document.getElementById('pickerGrid');
  if (items.length === 0) {
    grid.innerHTML = `<div class="picker-empty" style="grid-column:1/-1">
      <div class="picker-empty-icon">📭</div>
      <div>このカテゴリには商品がありません</div>
    </div>`;
    return;
  }
  grid.innerHTML = items.map((p, idx) => `
    <div class="pcard" onclick="confirmPickProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      ${p.badge ? `<div class="pcard-badge">${p.badge}</div>` : ''}
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-price">¥${p.price.toLocaleString()}</div>
      ${p.time ? `<div class="pcard-time">⏱ ${p.time}</div>` : ''}
    </div>
  `).join('');
}

function pickParent(id) {
  pickerParentId = id;
  const cat = CATS.find(c => c.id === id);
  pickerChildId = cat ? cat.children[0].id : null;
  renderPickerCats();
  renderPickerSubcats();
  renderPickerGrid();
}
function pickChild(id) {
  pickerChildId = id;
  renderPickerSubcats();
  renderPickerGrid();
}
function confirmPickProduct(p) {
  if (pickerSlotIdx === null) return;
  getSlotArr()[currentPage * PAGE + pickerSlotIdx] = {
    name: p.name, price: p.price, time: p.time || '', badge: p.badge || '', visible: true
  };
  isDirty = true;
  closePickerModal();
  renderProducts();
  showToast(`「${p.name}」をグリッドに追加しました`, 'blue', 2000);
}

function addProductAtSlot(i) {
  openPickerModal(i);
}
function addProduct(){
  const n=prompt('商品名');if(!n)return;
  const p=parseInt(prompt('金額 (¥)')||'0');
  const t=prompt('所要時間')||'';
  const arr=getSlotArr();
  const ei=arr.findIndex(s=>s===null);
  const item={name:n,price:p,time:t,badge:'',visible:true};
  if(ei>=0)arr[ei]=item;else arr.push(item);
  renderProducts();
}
function addCategory(){
  closeCatDropdown();
  const n=prompt('カテゴリ名');if(!n)return;
  const id='cat_'+Date.now();
  CATS.push({id,name:n,children:makeChildren(id)});
  SLOTS[id]=Array(PAGE).fill(null);SLOTS[id+'_all']=Array(PAGE).fill(null);
  renderCatBar();
}
function addSubcat(pid){
  closeSubcatDropdown();
  const n=prompt('サブカテゴリ名');if(!n)return;
  const id=pid+'_'+Date.now();
  CATS.find(c=>c.id===pid).children.push({id,name:n});
  SLOTS[id]=Array(PAGE).fill(null);
  renderSubcatBar();
}

// ── Cart ──────────────────────────────────────────────────────────────────────
function effectivePrice(item){
  if(!item.discount)return item.price;
  if(item.discount.type==='percent')return Math.round(item.price*(1-item.discount.value/100));
  return Math.max(0,item.price-item.discount.value);
}
function discLabel(item){
  if(!item.discount)return'割引';
  if(item.discount.type==='percent')return`-${item.discount.value}%`;
  return`-¥${item.discount.value.toLocaleString()}`;
}

function addToCart(p){
  const ex=cart.find(c=>c.name===p.name);
  if(ex){ex.qty++;}else{cart.push({id:nextId++,name:p.name,price:p.price,qty:1,discount:null});}
  renderCartPanel();
}
function removeItem(id){cart=cart.filter(c=>c.id!==id);renderCartPanel();}
function changeQty(id,d){const i=cart.find(c=>c.id===id);if(i){i.qty=Math.max(1,i.qty+d);renderCartPanel();}}

function renderCartPanel(){
  const el=document.getElementById('cartItems');
  if(!cart.length){
    el.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div class="cart-empty-text">商品を選択してください</div></div>`;
    document.getElementById('cartSummary').innerHTML='';
    document.getElementById('payBtn').classList.add('disabled');
    renderProducts();return;
  }
  el.innerHTML=cart.map(item=>{
    const ep=effectivePrice(item);
    const hasDisc=item.discount!==null;
    const totalEP=ep*item.qty;
    const totalOrig=item.price*item.qty;
    const priceClass=hasDisc?'ci-price discounted':'ci-price';
    const origHtml=hasDisc?`<span class="ci-price-orig" style="display:block">¥${totalOrig.toLocaleString()}</span>`:'';
    const discBtnOn=hasDisc?' on':'';
    return`<div class="ci">
      <div class="ci-top">
        <span class="ci-name">${item.name}</span>
        <div class="ci-price-wrap">
          ${origHtml}
          <span class="${priceClass}">¥${totalEP.toLocaleString()}</span>
        </div>
      </div>
      <div class="ci-bottom">
        <div class="ci-qty-group">
          <div class="qty-btn" onclick="changeQty(${item.id},-1)">－</div>
          <span class="qty-val">${item.qty}</span>
          <div class="qty-btn" onclick="changeQty(${item.id},1)">＋</div>
        </div>
        <div class="ci-disc-btn${discBtnOn}" onclick="openDiscModal(${item.id})">${discLabel(item)}</div>
        <div class="ci-del" onclick="removeItem(${item.id})">✕</div>
      </div>
    </div>`;
  }).join('');

  const subOrig=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const subDisc=cart.reduce((s,c)=>s+effectivePrice(c)*c.qty,0);
  const discAmt=subOrig-subDisc;
  const tax=Math.round(subDisc*10/110);
  const totalItems=cart.reduce((s,c)=>s+c.qty,0);
  const discItems=cart.filter(c=>c.discount!==null).reduce((s,c)=>s+c.qty,0);
  const discRow=discAmt>0
    ?`<div class="sum-row">
        <span class="sum-lbl">割引合計 <span style="color:#E74C3C;font-weight:600">(${discItems}点)</span></span>
        <span class="sum-disc-val">-¥${discAmt.toLocaleString()}</span>
      </div>`:'';

  document.getElementById('cartSummary').innerHTML=`
    <div class="sum-row">
      <span class="sum-lbl">小計 <span style="color:#888;font-weight:500">(${totalItems}点)</span></span>
      <span class="sum-val">¥${subOrig.toLocaleString()}</span>
    </div>
    ${discRow}
    <div class="sum-divider"></div>
    <div class="sum-total"><span class="sum-total-lbl">合計</span><span class="sum-total-val">¥${subDisc.toLocaleString()}</span></div>
    <div class="sum-tax">税込み · 消費税 ¥${tax.toLocaleString()}</div>`;
  document.getElementById('payBtn').classList.remove('disabled');
  renderProducts();
}

function goPayment(){if(!cart.length)return;alert('→ 03_pos_payment へ');}

// ── Discount modal ────────────────────────────────────────────────────────────
const PERCENT_PRESETS = [5,10,15,20,30,50];

function openDiscModal(id){
  const item=cart.find(c=>c.id===id);if(!item)return;
  discItemId=id;
  // restore existing discount into modal
  if(item.discount){
    discType=item.discount.type;
    discValue=item.discount.value;
  }else{
    discType='percent';discValue=0;
  }
  document.getElementById('discItemName').textContent=item.name;
  document.getElementById('discHeadPrice').textContent='定価 ¥'+item.price.toLocaleString()+(item.qty>1?` × ${item.qty}`:'');
  setDiscType(discType,true);
  document.getElementById('discOverlay').classList.add('open');
}
function closeDiscModal(){document.getElementById('discOverlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('discOverlay'))closeDiscModal();}

function setDiscType(type,skipInput=false){
  discType=type;
  document.getElementById('tabPct').classList.toggle('on',type==='percent');
  document.getElementById('tabFix').classList.toggle('on',type==='fixed');
  document.getElementById('discUnit').textContent=type==='percent'?'%':'円';
  document.getElementById('discCustomLabel').textContent=type==='percent'?'カスタム入力':'カスタム金額';

  // build presets
  const item=cart.find(c=>c.id===discItemId);
  const presets=document.getElementById('discPresets');
  if(type==='percent'){
    presets.innerHTML=PERCENT_PRESETS.map(v=>
      `<div class="disc-preset${discValue===v&&discType==='percent'?' on':''}" onclick="setDiscPreset(${v})">${v}%</div>`
    ).join('');
  }else{
    // fixed amount presets: 500, 1000, 1500, 2000, 3000
    const fixPresets=[500,1000,1500,2000,3000];
    presets.innerHTML=fixPresets.map(v=>
      `<div class="disc-preset${discValue===v&&discType==='fixed'?' on':''}" onclick="setDiscPreset(${v})">¥${v.toLocaleString()}</div>`
    ).join('');
  }

  if(!skipInput){discValue=0;document.getElementById('discInput').value='';}
  else document.getElementById('discInput').value=discValue||'';
  updateDiscPreview();
}
function setDiscPreset(v){
  discValue=v;
  document.getElementById('discInput').value=v;
  // highlight selected preset
  document.querySelectorAll('.disc-preset').forEach(el=>{
    el.classList.toggle('on',parseInt(el.textContent)===v||el.textContent==='¥'+v.toLocaleString());
  });
  updateDiscPreview();
}
function onDiscInput(){
  discValue=parseFloat(document.getElementById('discInput').value)||0;
  document.querySelectorAll('.disc-preset').forEach(el=>el.classList.remove('on'));
  updateDiscPreview();
}
function updateDiscPreview(){
  const item=cart.find(c=>c.id===discItemId);if(!item)return;
  const orig=item.price;
  let discAmt=0,after=orig;
  if(discValue>0){
    if(discType==='percent'){discAmt=Math.round(orig*discValue/100);after=orig-discAmt;}
    else{discAmt=Math.min(discValue,orig);after=orig-discAmt;}
  }
  document.getElementById('discPreview').innerHTML=`
    <div class="disc-preview-row"><span class="disc-preview-lbl">通常価格</span><span class="disc-preview-val">¥${orig.toLocaleString()}</span></div>
    <div class="disc-preview-row"><span class="disc-preview-lbl">割引額</span><span class="disc-preview-val red">${discAmt>0?`-¥${discAmt.toLocaleString()}`:'—'}</span></div>
    <div class="disc-preview-row"><span class="disc-preview-lbl">割引後</span><span class="disc-preview-val purple">¥${after.toLocaleString()}</span></div>`;
}
function applyDiscount(){
  const item=cart.find(c=>c.id===discItemId);if(!item)return;
  if(discValue<=0){item.discount=null;}
  else{item.discount={type:discType,value:discValue};}
  closeDiscModal();
  renderCartPanel();
  const label=discValue>0?(discType==='percent'?`${discValue}% 割引`:`¥${discValue.toLocaleString()} 割引`):'割引なし';
  showToast(`${item.name} に ${label} を適用しました`,'purple');
}
function clearDiscount(){
  const item=cart.find(c=>c.id===discItemId);if(!item)return;
  item.discount=null;
  closeDiscModal();
  renderCartPanel();
  showToast('割引を解除しました','blue');
}

// ── Close dropdowns outside ───────────────────────────────────────────────────
document.addEventListener('click',e=>{
  if(catDropdownOpen&&!e.target.closest('#catBar')&&!e.target.closest('#catDropdown'))closeCatDropdown();
  if(subcatDropdownOpen&&!e.target.closest('#subcatBar')&&!e.target.closest('#subcatDropdown'))closeSubcatDropdown();
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderCatBar();
renderSubcatBar();
renderProducts();
renderCartPanel();
requestAnimationFrame(()=>{
  initScrollFade(document.getElementById('catScroll'));
  initScrollFade(document.getElementById('subcatScroll'));
});
</script>
</body>
