<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>23 · 閉店処理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',sans-serif;background:#0F1D5C;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

.ipad{width:1024px;height:768px;background:#F0F2F7;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.55);position:relative;}

/* ══ ZONE A ══ */
.zone-a{height:44px;flex-shrink:0;background:#fff;border-bottom:.5px solid #E5E5E0;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:10;}
.za-menu{font-size:18px;color:#1E3A8A;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1;user-select:none;}
.za-menu:hover{background:#EEF2FF;}
.za-logo{font-size:13px;color:#1E3A8A;font-weight:700;letter-spacing:.08em;}
.za-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.za-sep{width:.5px;height:14px;background:#D0D0CC;}
.za-avatar{width:24px;height:24px;border-radius:50%;background:#8E44AD;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.za-name{font-size:12px;color:#333;font-weight:500;}
.za-branch{font-size:11px;color:#888;}
.za-time{font-size:11px;color:#555;font-weight:500;}
.za-lock{font-size:13px;color:#bbb;cursor:pointer;}

/* Sidebar */
.sb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.38);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.sb-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:absolute;left:0;top:0;bottom:0;width:560px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .22s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;box-shadow:6px 0 32px rgba(0,0,0,.18);}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:18px 20px 14px;border-bottom:.5px solid #EBEBE7;}
.sb-nav{flex:1;padding:6px 8px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:min-content;column-gap:4px;row-gap:0;align-content:start;}
.sb-item{display:flex;align-items:center;gap:10px;padding:13px 12px;cursor:pointer;transition:background .12s;border-radius:8px;}
.sb-item:hover{background:#F4F4F0;}
.sb-item.active{background:#EEF2FF;}
.sb-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#8B95A1;}
.sb-item.active .sb-icon{color:#1E3A8A;}
.sb-dot{display:none;}
.sb-label{font-size:13px;color:#333;}
.sb-item.active .sb-label{color:#1E3A8A;font-weight:700;}
.sb-divider{grid-column:1 / -1;height:.5px;background:#EBEBE7;margin:6px 4px;}
.sb-soon{font-size:8.5px;font-weight:700;color:#E74C3C;background:#FDEDEC;padding:1px 5px;border-radius:4px;margin-left:auto;flex-shrink:0;}
.sb-foot{padding:12px 20px;border-top:.5px solid #EBEBE7;}
.sb-ver{font-size:10px;color:#C4CAD4;}

/* ══ ZONE B ══ */
.zone-b{height:46px;flex-shrink:0;background:#fff;border-bottom:.5px solid #E5E5E0;display:flex;align-items:center;padding:0 14px;gap:10px;}
.zb-title{font-size:14px;font-weight:700;color:#1A1A1A;}
.zb-date{font-size:12px;color:#999;}
.zb-spacer{flex:1;}
.zb-close-btn{padding:9px 20px;border-radius:10px;background:#C0392B;color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(192,57,43,.3);transition:opacity .12s;}
.zb-close-btn:disabled{background:#D0D0CC;color:#999;cursor:not-allowed;box-shadow:none;}

/* ══ Main 2열 ══ */
.main{flex:1;display:flex;overflow:hidden;}
.col-left{width:380px;flex-shrink:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;border-right:.5px solid #E5E5E0;}
.col-right{flex:1;overflow-y:auto;padding:16px;}

.card{background:#fff;border:.5px solid #E5E5E0;border-radius:12px;overflow:hidden;}
.card-head{padding:11px 14px;border-bottom:.5px solid #F0F0EC;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;}
.card-body{padding:12px 14px;}

/* 매출 요약 */
.sales-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid #F8F8F6;font-size:12px;}
.sales-row:last-child{border-bottom:none;}
.sales-row .lbl{color:#999;}
.sales-row .val{font-weight:700;color:#1A1A1A;}
.sales-row .val.r{color:#E74C3C;}
.sales-big{text-align:center;padding:10px 0 14px;}
.sales-big-num{font-size:26px;font-weight:800;color:#2E86C1;}
.sales-big-unit{font-size:10px;color:#999;margin-top:3px;}
.method-split{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
.method-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#666;}
.method-bar{flex:1;height:5px;border-radius:3px;background:#F0F0EC;overflow:hidden;}
.method-fill{height:100%;border-radius:3px;}

/* 체크리스트 (22와 동일) */
.chk-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid #F8F8F6;cursor:pointer;}
.chk-row:last-child{border-bottom:none;}
.chk-box{width:20px;height:20px;border-radius:6px;border:1.5px solid #D0D0CC;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#fff;transition:all .12s;}
.chk-box.on{background:#C0392B;border-color:#C0392B;}
.chk-label{font-size:13px;color:#333;}
.chk-row.done .chk-label{color:#999;text-decoration:line-through;}

/* 시재 카운트 (22와 동일) */
.cash-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.cash-table col.c-denom{width:90px;}
.cash-table col.c-qty{width:140px;}
.cash-table col.c-sub{width:auto;}
.cash-table th{font-size:10px;color:#aaa;text-align:left;padding:6px 8px;border-bottom:.5px solid #EBEBE7;font-weight:600;}
.cash-table th:last-child,.cash-table td:last-child{text-align:right;}
.cash-table td{padding:6px 8px;font-size:13px;border-bottom:.5px solid #F8F8F6;}
.cash-table .denom{font-weight:600;color:#333;}
.cash-table input{width:48px;padding:6px 4px;border-radius:7px;border:.5px solid #D0D0CC;font-size:13px;font-family:inherit;text-align:center;}
.cash-table input:focus{outline:none;border-color:#C0392B;}
.cash-table .subtotal{color:#555;font-variant-numeric:tabular-nums;}
.qty-control{display:flex;align-items:center;gap:5px;}
.qty-btn{width:24px;height:24px;border-radius:6px;border:.5px solid #D0D0CC;background:#F8F8F6;color:#555;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .1s;}
.qty-btn:hover{background:#EFEFEC;}
.qty-btn:disabled{opacity:.35;cursor:default;}

.cash-summary{margin-top:14px;padding:14px;border-radius:10px;background:#FAFAF8;}
.cs-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;}
.cs-row .lbl{color:#888;}
.cs-row .val{font-weight:700;color:#1A1A1A;}
.cs-row.total .val{font-size:18px;color:#C0392B;}
.cs-row.diff .val.match{color:#117A65;}
.cs-row.diff .val.mismatch{color:#E74C3C;}
.cs-hint{font-size:11px;color:#E74C3C;margin-top:4px;text-align:right;height:14px;visibility:hidden;}
.cs-hint.show{visibility:visible;}
.cs-formula{font-size:10px;color:#bbb;margin-top:2px;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A1A;color:#fff;font-size:12px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="ipad">

  <div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">✂ salon pos</div>
      <div class="sb-sub">Hair Salon Yuki · 渋谷区道玄坂</div>
    </div>
    <div class="sb-nav">
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">🧾</span><span class="sb-label">会計・POS</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📅</span><span class="sb-label">予約カレンダー</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">👥</span><span class="sb-label">顧客管理</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">🧑‍💼</span><span class="sb-label">スタッフ</span></div>
      <div class="sb-divider"></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📦</span><span class="sb-label">商品・在庫管理</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📊</span><span class="sb-label">売上レポート</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📣</span><span class="sb-label">マーケティング</span></div>
      <div class="sb-item active" onclick="closeSb()"><span class="sb-icon">⚙️</span><span class="sb-label">店舗設定</span></div>
    </div>
    <div class="sb-foot"><div class="sb-ver">v2.0.0</div></div>
  </div>

  <!-- ══ ZONE A ══ -->
  <div class="zone-a">
    <span class="za-menu" onclick="openSb()">☰</span>
    <span class="za-logo">✂ salon pos</span>
    <div class="za-right">
      <div class="za-avatar">由</div>
      <span class="za-name">Yuki</span>
      <span class="za-branch">渋谷店</span>
      <div class="za-sep"></div>
      <span class="za-time" id="tbTime">06.21 日　20:05</span>
      <span class="za-lock">🔒</span>
    </div>
  </div>

  <!-- ══ ZONE B ══ -->
  <div class="zone-b">
    <span class="zb-title">閉店処理</span>
    <span class="zb-date">2026年6月21日（日）</span>
    <div class="zb-spacer"></div>
    <button class="zb-close-btn" id="closeBtn" onclick="confirmClose()" disabled>閉店確定</button>
  </div>

  <div class="main">
    <!-- ══ 좌측: 매출요약 + 체크리스트 ══ -->
    <div class="col-left">
      <div class="card">
        <div class="card-head">本日の売上サマリー</div>
        <div class="card-body">
          <div class="sales-big">
            <div class="sales-big-num" id="salesTotal">¥0</div>
            <div class="sales-big-unit">総売上（返金反映後）</div>
          </div>
          <div class="sales-row"><span class="lbl">取引件数</span><span class="val" id="salesCount">-</span></div>
          <div class="sales-row"><span class="lbl">返金件数</span><span class="val r" id="refundCount">-</span></div>
          <div class="sales-row"><span class="lbl">返金額</span><span class="val r" id="refundAmount">-</span></div>
          <div class="method-split" id="methodSplit"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">閉店チェックリスト</div>
        <div class="card-body" id="checklistBody"></div>
      </div>
    </div>

    <!-- ══ 우측: 시재 카운트 ══ -->
    <div class="col-right">
      <div class="card">
        <div class="card-head">レジ締めカウント</div>
        <div class="card-body">
          <table class="cash-table">
            <colgroup><col class="c-denom"><col class="c-qty"><col class="c-sub"></colgroup>
            <thead><tr><th>金種</th><th>枚数・個数</th><th>小計</th></tr></thead>
            <tbody id="cashRows"></tbody>
          </table>
          <div class="cash-summary">
            <div class="cs-row total"><span class="lbl">合計</span><span class="val" id="cashTotal">¥0</span></div>
            <div class="cs-row"><span class="lbl">予想締め額</span><span class="val" id="expectedVal">¥0</span></div>
            <div class="cs-formula" id="formulaText"></div>
            <div class="cs-row diff"><span class="lbl">差額</span><span class="val" id="diffVal">-</span></div>
            <div class="cs-hint" id="diffHint">差額があります。再確認してください。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /ipad -->

<script>
// ── Data ─────────────────────────────────────────────────────────────────
const START_CASH = 50000; // 22_store_open에서 확정된 시작금 (mock)

const TODAY_SALES = {
  total: 128700,
  count: 13,
  refundCount: 1,
  refundAmount: 2200,
  byMethod: {cash:35000, card:52000, paypay:24500, linepay:17200, credit:0},
};
const METHOD_LABEL = {cash:'現金', card:'カード', paypay:'PayPay', linepay:'LINE Pay', credit:'後払い'};
const METHOD_COLOR = {cash:'#117A65', card:'#2E86C1', paypay:'#D4AC0D', linepay:'#8E44AD', credit:'#7D3C98'};

let CHECKLIST = [
  {id:1, label:'本日の売上精算書を出力・確認', checked:false},
  {id:2, label:'施術スペース・待合スペースを整理', checked:false},
  {id:3, label:'消耗品・在庫の締め確認', checked:false},
  {id:4, label:'出入口施錠・セキュリティON', checked:false},
];

let DENOMS = [
  {value:10000, label:'¥10,000', qty:0},
  {value:5000,  label:'¥5,000',  qty:0},
  {value:1000,  label:'¥1,000',  qty:0},
  {value:500,   label:'¥500',    qty:0},
  {value:100,   label:'¥100',    qty:0},
  {value:50,    label:'¥50',     qty:0},
  {value:10,    label:'¥10',     qty:0},
  {value:5,     label:'¥5',      qty:0},
  {value:1,     label:'¥1',      qty:0},
];

const fmtY = n=>`¥${n.toLocaleString()}`;

// ── Render ───────────────────────────────────────────────────────────────
function renderSales(){
  document.getElementById('salesTotal').textContent = fmtY(TODAY_SALES.total - TODAY_SALES.refundAmount);
  document.getElementById('salesCount').textContent = TODAY_SALES.count+'件';
  document.getElementById('refundCount').textContent = TODAY_SALES.refundCount+'件';
  document.getElementById('refundAmount').textContent = fmtY(TODAY_SALES.refundAmount);

  const max=Math.max(...Object.values(TODAY_SALES.byMethod),1);
  document.getElementById('methodSplit').innerHTML = Object.keys(TODAY_SALES.byMethod).map(m=>`
    <div class="method-row">
      <span style="width:52px;">${METHOD_LABEL[m]}</span>
      <div class="method-bar"><div class="method-fill" style="width:${TODAY_SALES.byMethod[m]/max*100}%;background:${METHOD_COLOR[m]};"></div></div>
      <span style="width:54px;text-align:right;">${fmtY(TODAY_SALES.byMethod[m])}</span>
    </div>`).join('');
}

function renderChecklist(){
  document.getElementById('checklistBody').innerHTML = CHECKLIST.map(c=>`
    <div class="chk-row${c.checked?' done':''}" onclick="toggleCheck(${c.id})">
      <div class="chk-box${c.checked?' on':''}">${c.checked?'✓':''}</div>
      <span class="chk-label">${c.label}</span>
    </div>`).join('');
  updateCloseBtn();
}

function expectedClose(){
  return START_CASH + TODAY_SALES.byMethod.cash - (TODAY_SALES.refundAmount); // 단순화: 환불은 현금으로 가정
}

// テーブル行は初回に1度だけ作り、以後はクリック毎に行全体を作り直さず
// 該当セルだけ更新する（毎回innerHTMLを再構築すると列幅が再計算されてガタつくため）。
function buildCashRows(){
  document.getElementById('cashRows').innerHTML = DENOMS.map(d=>`
    <tr>
      <td class="denom">${d.label}</td>
      <td>
        <div class="qty-control">
          <button class="qty-btn" id="dec-${d.value}" onclick="stepQty(${d.value},-1)" disabled>−</button>
          <input type="number" min="0" id="qty-${d.value}" value="" placeholder="0" oninput="updateQty(${d.value}, this.value)">
          <button class="qty-btn" onclick="stepQty(${d.value},1)">＋</button>
        </div>
      </td>
      <td class="subtotal" id="sub-${d.value}">${fmtY(0)}</td>
    </tr>`).join('');
}
function refreshCash(){
  let total=0;
  DENOMS.forEach(d=>{
    const sub=d.value*d.qty;
    total+=sub;
    document.getElementById(`sub-${d.value}`).textContent=fmtY(sub);
    document.getElementById(`dec-${d.value}`).disabled = d.qty<=0;
    const inp=document.getElementById(`qty-${d.value}`);
    if(document.activeElement!==inp) inp.value=d.qty||'';
  });
  const expected = expectedClose();
  document.getElementById('cashTotal').textContent = fmtY(total);
  document.getElementById('expectedVal').textContent = fmtY(expected);
  document.getElementById('formulaText').textContent = `開始金 ${fmtY(START_CASH)} ＋ 現金売上 ${fmtY(TODAY_SALES.byMethod.cash)} − 返金 ${fmtY(TODAY_SALES.refundAmount)}`;

  const diff = total - expected;
  const diffEl = document.getElementById('diffVal');
  const hintEl = document.getElementById('diffHint');
  if(total===0){
    diffEl.textContent='-'; diffEl.className='val';
    hintEl.classList.remove('show');
  } else if(diff===0){
    diffEl.textContent='¥0（一致）'; diffEl.className='val match';
    hintEl.classList.remove('show');
  } else {
    diffEl.textContent=(diff>0?'+':'')+fmtY(diff); diffEl.className='val mismatch';
    hintEl.classList.add('show');
  }
  updateCloseBtn();
}

function updateCloseBtn(){
  const allChecked = CHECKLIST.every(c=>c.checked);
  const total = DENOMS.reduce((s,d)=>s+d.value*d.qty,0);
  document.getElementById('closeBtn').disabled = !(allChecked && total>0);
}

// ── Actions ──────────────────────────────────────────────────────────────
function toggleCheck(id){
  const c=CHECKLIST.find(x=>x.id===id); if(!c) return;
  c.checked=!c.checked;
  renderChecklist();
}
function stepQty(value, dir){
  const d=DENOMS.find(x=>x.value===value); if(!d) return;
  d.qty = Math.max(0, (d.qty||0)+dir);
  refreshCash();
}
function updateQty(value, qty){
  const d=DENOMS.find(x=>x.value===value); if(!d) return;
  d.qty = Math.max(0, parseInt(qty)||0);
  refreshCash();
}
function confirmClose(){
  if(document.getElementById('closeBtn').disabled) return;
  toast('閉店処理が完了しました。お疲れ様でした！');
}

function openSb(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sbOverlay').classList.add('open'); }
function closeSb(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('open'); }

let _tt;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400); }

const DOW=['日','月','火','水','木','金','土'];
function tick(){
  const d=new Date();
  const el=document.getElementById('tbTime');
  if(el) el.textContent=`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${DOW[d.getDay()]}　${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Init ─────────────────────────────────────────────────────────────────
renderSales();
renderChecklist();
buildCashRows();
refreshCash();
tick();
setInterval(tick,30000);
</script>
</body>
</html>
