<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>11 · スタッフ一覧</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',sans-serif;background:#0F1D5C;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.ipad{width:1024px;height:768px;background:#F0F2F7;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.55);position:relative;}

.zone-a{height:44px;flex-shrink:0;background:#fff;border-bottom:.5px solid #E5E5E0;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:10;}
.za-menu{font-size:18px;color:#1E3A8A;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1;user-select:none;}
.za-menu:hover{background:#EEF2FF;}
.za-logo{font-size:13px;color:#1E3A8A;font-weight:700;letter-spacing:.08em;}
.za-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.za-sep{width:.5px;height:14px;background:#D0D0CC;}
.za-avatar{width:24px;height:24px;border-radius:50%;background:#8E44AD;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.za-name{font-size:12px;color:#333;font-weight:500;}
.za-branch{font-size:11px;color:#888;}
.za-time{font-size:11px;color:#555;font-weight:500;}
.za-lock{font-size:13px;color:#bbb;cursor:pointer;}

.sb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.38);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.sb-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:absolute;left:0;top:0;bottom:0;width:560px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform .22s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;box-shadow:6px 0 32px rgba(0,0,0,.18);}
.sidebar.open{transform:translateX(0);}
.sb-head{padding:18px 20px 14px;border-bottom:.5px solid #EBEBE7;}
.sb-nav{flex:1;padding:6px 8px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:min-content;column-gap:4px;row-gap:0;align-content:start;}
.sb-item{display:flex;align-items:center;gap:10px;padding:13px 12px;cursor:pointer;transition:background .12s;border-radius:8px;}
.sb-item:hover{background:#F4F4F0;}
.sb-item.active{background:#EEF2FF;}
.sb-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#8B95A1;}
.sb-item.active .sb-icon{color:#1E3A8A;}
.sb-dot{display:none;}
.sb-label{font-size:13px;color:#333;}
.sb-item.active .sb-label{color:#1E3A8A;font-weight:700;}
.sb-divider{grid-column:1 / -1;height:.5px;background:#EBEBE7;margin:6px 4px;}
.sb-soon{font-size:8.5px;font-weight:700;color:#E74C3C;background:#FDEDEC;padding:1px 5px;border-radius:4px;margin-left:auto;flex-shrink:0;}
.sb-foot{padding:12px 20px;border-top:.5px solid #EBEBE7;}
.sb-ver{font-size:10px;color:#C4CAD4;}

.wrap{flex:1;display:flex;overflow:hidden;}
.left{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

.zone-b{height:46px;flex-shrink:0;background:#fff;border-bottom:.5px solid #E5E5E0;display:flex;align-items:center;padding:0 12px;gap:8px;}
.zb-tabs{display:flex;background:#F0F2F7;border-radius:9px;padding:3px;gap:2px;flex-shrink:0;}
.zb-tab{padding:6px 11px;font-size:11.5px;font-weight:600;color:#999;cursor:pointer;border-radius:7px;background:transparent;border:none;font-family:inherit;white-space:nowrap;transition:all .15s;}
.zb-tab.active{background:#fff;color:#C0392B;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.zb-search{width:170px;flex-shrink:0;}
.zb-search input{width:100%;padding:7px 11px;border-radius:8px;border:.5px solid #E0E0DC;font-size:12px;font-family:inherit;color:#333;background:#FAFAFA;}
.zb-search input:focus{outline:none;border-color:#C0392B;background:#fff;}
.zb-spacer{flex:1;}
.zb-add-btn{display:flex;align-items:center;gap:4px;padding:7px 13px;border-radius:9px;background:#C0392B;color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;box-shadow:0 2px 8px rgba(192,57,43,.3);}
.zb-add-btn:hover{background:#A93226;}
.zb-shift-btn{padding:7px 13px;border-radius:9px;border:.5px solid #E0E0DC;background:#fff;color:#555;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.zb-shift-btn:hover{background:#F4F4F0;}

.zone-c{flex:1;overflow-y:auto;background:#F0F2F7;}
.zone-c::-webkit-scrollbar{width:4px;}
.zone-c::-webkit-scrollbar-thumb{background:#D0D0CC;border-radius:2px;}
.zc-inner{padding:12px 14px;display:flex;flex-direction:column;gap:6px;}

.s-card{background:#fff;border:.5px solid #E5E5E0;border-radius:11px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .12s,border-color .12s;}
.s-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);border-color:#F1B9B2;}
.s-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.s-body{flex:1;min-width:0;}
.s-top{display:flex;align-items:center;gap:7px;}
.s-name{font-size:13.5px;font-weight:700;color:#1A1A1A;}
.s-role{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;}
.s-role.owner{background:#FDEDEC;color:#C0392B;}
.s-role.manager{background:#F5EEF8;color:#8E44AD;}
.s-role.senior{background:#EBF5FB;color:#2E86C1;}
.s-role.staff{background:#F4F4F0;color:#888;}
.s-sub{font-size:11px;color:#999;margin-top:2px;}
.s-stats{display:flex;gap:16px;flex-shrink:0;}
.s-stat{text-align:center;min-width:60px;}
.s-stat-val{font-size:13px;font-weight:700;color:#1A1A1A;}
.s-stat-lbl{font-size:9px;color:#aaa;margin-top:1px;}
.s-presence{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;flex-shrink:0;white-space:nowrap;}
.s-presence.here{background:#EAFAF1;color:#117A65;}
.s-presence.away{background:#F4F4F0;color:#aaa;}

.zone-d{width:210px;flex-shrink:0;border-left:.5px solid #E5E5E0;background:#fff;display:flex;flex-direction:column;overflow-y:auto;}
.zd-sec{padding:14px 14px;border-bottom:.5px solid #F0F0EC;}
.zd-title{font-size:9px;font-weight:700;color:#C8C8C4;letter-spacing:.08em;text-transform:uppercase;margin-bottom:9px;}
.zd-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid #F8F8F6;font-size:12px;}
.zd-row:last-child{border-bottom:none;}
.zd-label{color:#999;}
.zd-val{font-weight:700;color:#1A1A1A;}
.zd-legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:#666;padding:4px 0;}
.zd-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A1A;color:#fff;font-size:12px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="ipad">
  <div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">✂ salon pos</div>
      <div class="sb-sub">Hair Salon Yuki · 渋谷区道玄坂</div>
    </div>
    <div class="sb-nav">
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">🧾</span><span class="sb-label">会計・POS</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📅</span><span class="sb-label">予約カレンダー</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">👥</span><span class="sb-label">顧客管理</span></div>
      <div class="sb-item active" onclick="closeSb()"><span class="sb-icon">🧑‍💼</span><span class="sb-label">スタッフ</span></div>
      <div class="sb-divider"></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📦</span><span class="sb-label">商品・在庫管理</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📊</span><span class="sb-label">売上レポート</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">📣</span><span class="sb-label">マーケティング</span></div>
      <div class="sb-item" onclick="closeSb()"><span class="sb-icon">⚙️</span><span class="sb-label">店舗設定</span></div>
    </div>
    <div class="sb-foot"><div class="sb-ver">v2.0.0</div></div>
  </div>

  <div class="zone-a">
    <span class="za-menu" onclick="openSb()">☰</span>
    <span class="za-logo">✂ salon pos</span>
    <div class="za-right">
      <div class="za-avatar">由</div>
      <span class="za-name">Yuki</span>
      <span class="za-branch">渋谷店</span>
      <div class="za-sep"></div>
      <span class="za-time" id="tbTime">06.21 日　10:24</span>
      <span class="za-lock">🔒</span>
    </div>
  </div>

  <div class="wrap">
    <div class="left">
      <div class="zone-b">
        <div class="zb-tabs" id="zbTabs">
          <div class="zb-tab active" data-t="all" onclick="switchTab('all',this)">すべて</div>
          <div class="zb-tab" data-t="owner" onclick="switchTab('owner',this)">オーナー</div>
          <div class="zb-tab" data-t="manager" onclick="switchTab('manager',this)">店長</div>
          <div class="zb-tab" data-t="senior" onclick="switchTab('senior',this)">主任</div>
          <div class="zb-tab" data-t="staff" onclick="switchTab('staff',this)">スタッフ</div>
        </div>
        <div class="zb-search"><input type="text" id="searchInput" placeholder="名前で検索" oninput="onSearch(this.value)"></div>
        <div class="zb-spacer"></div>
        <button class="zb-shift-btn" onclick="location.href='13_staff_shift.html'">勤怠ログ（全店舗）</button>
        <button class="zb-add-btn" onclick="toast('新規スタッフ登録フォーム（モック）')">＋スタッフ追加</button>
      </div>

      <div class="zone-c"><div class="zc-inner" id="zcInner"></div></div>
    </div>

    <div class="zone-d">
      <div class="zd-sec">
        <div class="zd-title">スタッフ状況</div>
        <div class="zd-row"><span class="zd-label">総スタッフ数</span><span class="zd-val" id="statTotal">-</span></div>
        <div class="zd-row"><span class="zd-label">本日在店中</span><span class="zd-val" id="statHere">-</span></div>
        <div class="zd-row"><span class="zd-label">他店ヘルプ中</span><span class="zd-val" id="statHelp">-</span></div>
      </div>
      <div class="zd-sec">
        <div class="zd-title">権限レベル</div>
        <div class="zd-legend-item"><div class="zd-legend-dot" style="background:#C0392B"></div>オーナー：全権限</div>
        <div class="zd-legend-item"><div class="zd-legend-dot" style="background:#8E44AD"></div>店長：開店・閉店・スタッフ管理</div>
        <div class="zd-legend-item"><div class="zd-legend-dot" style="background:#2E86C1"></div>主任：返金承認まで</div>
        <div class="zd-legend-item"><div class="zd-legend-dot" style="background:#888"></div>スタッフ：POS・予約のみ</div>
      </div>
    </div>
  </div>
</div>

<script>
const AVATAR_COLORS={owner:'#C0392B',manager:'#8E44AD',senior:'#2E86C1',staff:'#117A65'};
const ROLE_LABEL={owner:'オーナー',manager:'店長',senior:'主任',staff:'スタッフ'};

let STAFFS=[
  {id:1, name:'Admin',  initial:'管', role:'owner',   branch:'渋谷店', here:true,  thisMonthSales:0,      thisMonthCount:0},
  {id:2, name:'Yuki',   initial:'由', role:'manager', branch:'渋谷店', here:true,  thisMonthSales:482000, thisMonthCount:64},
  {id:3, name:'Mika',   initial:'美', role:'senior',  branch:'渋谷店', here:true,  thisMonthSales:355000, thisMonthCount:58},
  {id:4, name:'Kenji',  initial:'健', role:'staff',   branch:'渋谷店', here:false, thisMonthSales:198000, thisMonthCount:41},
  {id:5, name:'Rio',    initial:'里', role:'staff',   branch:'池袋店', here:true,  thisMonthSales:144000, thisMonthCount:33},
  {id:6, name:'Hana',   initial:'花', role:'senior',  branch:'渋谷店', here:false, thisMonthSales:0,      thisMonthCount:0},
];

let curTab='all', filterText='';

function render(){
  let list=[...STAFFS];
  if(curTab!=='all') list=list.filter(s=>s.role===curTab);
  if(filterText) list=list.filter(s=>s.name.includes(filterText));

  document.getElementById('zcInner').innerHTML = list.map(s=>`
    <div class="s-card" onclick="openDetail(${s.id})">
      <div class="s-avatar" style="background:${AVATAR_COLORS[s.role]}">${s.initial}</div>
      <div class="s-body">
        <div class="s-top"><span class="s-name">${s.name}</span><span class="s-role ${s.role}">${ROLE_LABEL[s.role]}</span></div>
        <div class="s-sub">所属: ${s.branch}</div>
      </div>
      <div class="s-stats">
        <div class="s-stat"><div class="s-stat-val">¥${s.thisMonthSales.toLocaleString()}</div><div class="s-stat-lbl">今月売上</div></div>
        <div class="s-stat"><div class="s-stat-val">${s.thisMonthCount}件</div><div class="s-stat-lbl">今月件数</div></div>
      </div>
      <span class="s-presence ${s.here?'here':'away'}">${s.here?'在店中':'未出勤'}</span>
    </div>`).join('');

  document.getElementById('statTotal').textContent=STAFFS.length+'名';
  document.getElementById('statHere').textContent=STAFFS.filter(s=>s.here).length+'名';
  document.getElementById('statHelp').textContent=STAFFS.filter(s=>s.here&&s.branch!=='渋谷店').length+'名';
}

function switchTab(t,el){
  curTab=t;
  document.querySelectorAll('.zb-tab').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  render();
}
function onSearch(v){ filterText=v.trim(); render(); }
function openDetail(id){
  window.location.href='12_staff_detail.html?id='+id;
}

function openSb(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sbOverlay').classList.add('open'); }
function closeSb(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('open'); }

let _tt;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400); }

const DOW=['日','月','火','水','木','金','土'];
function tick(){
  const d=new Date();
  const el=document.getElementById('tbTime');
  if(el) el.textContent=`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${DOW[d.getDay()]}　${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

render();
tick();
setInterval(tick,30000);
</script>
</body>
</html>
